name: Check for app version updates

on:
  schedule:
    - cron: "0 6 * * 1" # Every Monday 06:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  check-updates:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check for updates
        id: check
        run: |
          output=$(python .github/scripts/check_updates.py --verbose 2>&1)
          echo "$output"
          if echo "$output" | grep -q "Updates found:"; then
            echo "has_updates=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_updates=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create Pull Request
        if: steps.check.outputs.has_updates == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          branch: auto-update/app-versions
          commit-message: "chore: update app versions"
          title: "chore: update app versions"
          body: |
            Automated update of app versions in `custom_apps.json`, `versions.json`, and related config files.

            Please review the changes and merge when ready. After merging to `main`,
            cherry-pick or merge into `release` to trigger a new image build.

            ---
            Generated by the [check_updates](.github/workflows/check_updates.yml) workflow.
          labels: dependencies
